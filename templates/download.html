<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>download: {{file['name']}} </title>
    <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
</head>

<body>
    <header>
        {% if session.get('id') %}
        <a href="{{url_for('home')}}"><button>back to home</button></a>
        {% else %}
        <a href="{{url_for('login')}}"><button>login to upload your own</button></a>
        {% endif %}
    </header>
    <main>
        <a href="data:{{file['mimetype']}};base64,{{file['data']}}" download="{{file['name']}}"><button>download</button></a>
        {% if file['mimetype'].startswith('image/',0) %}
        <img class="preview" src="data:{{file['mimetype']}};base64,{{file['data']}}" alt="{{file['name']}}">
        {% endif %}
        {% if file['mimetype'].startswith('text/',0) %}
        <p>
            {{decoded_data}}
        </p>
        {% endif %}
    </main>
    <footer>
        {% if not session.get('id') %}
        <a href="{{url_for('logout')}}"><button>logout</button></a>

        {% endif %}
    </footer>
</body>

</html>
